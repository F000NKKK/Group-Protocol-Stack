name: Bug Report
description: Report a bug in the GBP Stack
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        For security vulnerabilities, please see [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Create a GbpNode with ...
        2. Send a frame with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages, panics, or unexpected output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.2.2"
    validations:
      required: true

  - type: dropdown
    id: binding
    attributes:
      label: Language binding
      options:
        - Rust (native)
        - .NET (NuGet GBPStack)
        - Node.js (npm)
        - Python (PyPI)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "Ubuntu 24.04 x86_64 / Windows 11 arm64 / macOS 14 arm64"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
