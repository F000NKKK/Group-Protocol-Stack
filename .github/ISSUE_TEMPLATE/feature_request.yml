name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you have considered.
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer or binding
      multiple: true
      options:
        - gbp-core
        - gbp-protocol
        - gtp-protocol
        - gap-protocol
        - gsp-protocol
        - gbp-mls
        - gbp-transport
        - gbp-node
        - gbp-sframe
        - gbp-stack-ffi
        - .NET binding
        - Node.js binding
        - Python binding
        - Documentation
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
